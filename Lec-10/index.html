<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>

<body>
    <video src="video.mp4" height="400" width="" controls poster="image.jpg"></video>
    <svg height="100" width="100">
        <circle cx="50" cy="50" r="40" stroke="black" stroke-width="3" fill="red" />
    </svg>
    <img src="img.svg" alt="SVG Image" />
    <!-- <iframe src="https://www.codewithharry.com/tutorial/working-with-svg" width ="600" height="400"></iframe> -->

        title="YouTube video player" frameborder="0"
        allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share"
        referrerpolicy="strict-origin-when-cross-origin" allowfullscreen></iframe>
    <br>
    <div>
        <h1>Learned in this lecture</h1>
        <p>Learned about SVG and how to use it in HTML. Also learned about the video tag and its attributes, as well as

    </svg>
